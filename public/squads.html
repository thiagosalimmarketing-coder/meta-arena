<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VÓRTEX · Squads IA</title>
<style>
  :root{--bg:#090909;--surf:#0f0f0f;--surf2:#111;--brd:#1c1c1c;--brd2:#222;--txt:#ebe7e1;--dim:#555;--dim2:#333;--acc:#d4956a;--green:#5bad85;--red:#e07070;--purple:#9b7dbf;--blue:#6a8eb5;--yellow:#d4c06a;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font-family:Georgia,serif;font-size:14px;min-height:100vh}
  input,select,textarea{background:var(--surf);border:1px solid var(--brd);color:var(--txt);padding:9px 13px;border-radius:7px;font-size:13px;outline:none;font-family:Georgia,serif;transition:border-color .15s;width:100%}
  input:focus,select:focus,textarea:focus{border-color:var(--acc)}
  button{cursor:pointer;font-family:Georgia,serif;font-weight:600;border:none;border-radius:6px;transition:all .15s}
  button:hover:not(:disabled){opacity:.82}
  button:disabled{opacity:.35;cursor:not-allowed}
  ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:#222;border-radius:3px}
  select option{background:#111}
  textarea{resize:vertical;line-height:1.7}

  #nav{border-bottom:1px solid var(--brd);padding:12px 22px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
  .nav-sub{font-size:10px;letter-spacing:.35em;color:#282828;text-transform:uppercase;margin-bottom:2px}
  .nav-title{font-size:17px;font-weight:400}

  #layout{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 52px)}
  @media(max-width:760px){#layout{grid-template-columns:1fr}}

  /* SIDEBAR */
  #sidebar{border-right:1px solid var(--brd);padding:18px 14px;overflow-y:auto;max-height:calc(100vh - 52px)}
  .squad-btn{width:100%;text-align:left;padding:12px 14px;border-radius:8px;background:transparent;border:1px solid transparent;color:var(--dim);margin-bottom:6px;transition:all .15s;display:flex;align-items:center;gap:10px}
  .squad-btn:hover{background:var(--surf2);border-color:var(--brd);color:var(--txt)}
  .squad-btn.active{background:var(--surf2);border-color:var(--acc);color:var(--txt)}
  .squad-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
  .squad-info{flex:1;min-width:0}
  .squad-name{font-size:13px;font-weight:600;margin-bottom:2px}
  .squad-desc{font-size:10.5px;color:var(--dim);font-family:monospace}

  /* MAIN */
  #main-panel{display:flex;flex-direction:column;max-height:calc(100vh - 52px)}
  #agent-header{padding:18px 22px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:14px}
  #agent-icon-big{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
  #agent-name{font-size:18px;font-weight:400;margin-bottom:3px}
  #agent-tagline{font-size:12px;color:var(--dim);font-family:monospace}

  /* CHAT */
  #chat-area{flex:1;overflow-y:auto;padding:18px 22px;display:flex;flex-direction:column;gap:14px}
  .msg{max-width:80%;padding:13px 16px;border-radius:10px;font-size:13.5px;line-height:1.75;animation:fadeIn .25s ease}
  .msg-user{align-self:flex-end;background:#d4956a18;border:1px solid #d4956a25;color:var(--txt)}
  .msg-agent{align-self:flex-start;background:var(--surf);border:1px solid var(--brd);color:#c0bbb5;white-space:pre-wrap}
  .msg-agent .agent-tag{font-size:10px;letter-spacing:.1em;color:var(--dim);text-transform:uppercase;margin-bottom:6px;display:block}
  .msg-loading{display:flex;gap:5px;padding:16px;align-self:flex-start}
  .dot-anim{width:7px;height:7px;border-radius:50%;background:var(--dim);animation:bounce .9s infinite}
  .dot-anim:nth-child(2){animation-delay:.15s}
  .dot-anim:nth-child(3){animation-delay:.3s}

  /* INPUT */
  #input-area{padding:14px 18px;border-top:1px solid var(--brd);display:flex;gap:8px;align-items:flex-end}
  #user-input{flex:1;min-height:44px;max-height:120px;resize:none;padding:11px 14px;font-family:Georgia,serif;font-size:13.5px;line-height:1.55}
  #btn-send{padding:11px 18px;background:var(--acc);color:#080808;font-size:13px;border:none;border-radius:7px;cursor:pointer;flex-shrink:0;align-self:flex-end}

  /* QUICK PROMPTS */
  #quick-prompts{padding:10px 18px 0;display:flex;gap:6px;flex-wrap:wrap}
  .qp{padding:5px 11px;border-radius:20px;border:1px solid var(--brd);background:transparent;color:var(--dim);font-size:11.5px;cursor:pointer;font-family:monospace;transition:all .15s}
  .qp:hover{border-color:var(--acc);color:var(--acc)}

  @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  .hidden{display:none!important}
</style>
</head>

<script>

  {

Ao gerar copy, sempre entregue 3 variações para teste A/B.

    system:`Você é o Estrategista de Funil do VÓRTEX, especialista em jornada do cliente e estrutura de campanhas de marketing digital no Brasil.

BoFu (Conversão): Compra, reunião, matrícula, retargeting quente

PÚBLICOS POR ETAPA:

MÉTRICAS POR ETAPA:

Ao criar estratégia, sempre defina: objetivo por etapa, público, formato, copy direction, KPI e budget sugerido.
Responda em português. Seja estruturado e prático.`
  },
  {
    id:"criativos",
    name:"Diretor de Criativos",
    icon:"🎨",
    color:"#5bad85",
    bg:"#5bad8518",
    tagline:"Briefs · UGC · Direção visual · Formatos por plataforma",
    quickPrompts:["Brief para vídeo UGC de beach tennis","O que está matando meu criativo?","Melhores formatos para Meta em 2025","Como criar hook visual forte em Reels?"],
    system:`Você é o Diretor de Criativos do VÓRTEX, especialista em produção criativa para tráfego pago no Brasil.

IDENTIDADE: Visual, direto, orientado a resultado. Você sabe que o criativo é o maior driver de performance — supera segmentação, estratégia de lance e estrutura.

FRAMEWORK DE CRIATIVO:
Segundos 0-2: HOOK VISUAL (para o scroll sem som)

Segundos 5-10: SOLUÇÃO (produto/serviço em ação)
Segundos 10-13: PROVA (resultado, reação, depoimento)
Segundos 13-15: CTA (link, WhatsApp, formulário)

FORMATOS QUE CONVERTEM (Meta 2025):

- Carrossel feed: educacional, comparativo, step-by-step
- Imagem estática: promoção com preço, produto clean, texto mínimo

UGC FORMULA:

✅ Pessoa falando direto para câmera
✅ Legenda no vídeo (80% sem som)
❌ Câmera profissional com produção pesada
❌ Logo nos primeiros 3 segundos

DIAGNÓSTICO DE CRIATIVO:
- CTR < 0.5% em 3 dias = hook não funciona
- Alto play rate, baixo CTR = CTA fraco
- Alto CTR, baixa conversão = promessa x entrega desalinhada

Responda em português. Seja visual e específico.`
  },
  {
    id:"growth",
    name:"Head de Growth",
    icon:"🔬",
    color:"#e07070",
    bg:"#e0707018",
    tagline:"Escala · Otimização · ROI · Sistema de marketing",
    quickPrompts:["Meu sistema está pronto para escalar?","Como reduzir CAC em 30%?","Análise completa do meu sistema","Plano de 30 dias para dobrar leads"],
    system:`Você é um Head de Growth Sênior responsável por otimizar, corrigir e escalar sistemas de marketing digital já existentes. Você NÃO cria sistemas do zero. Sua função é diagnosticar gargalos, identificar falhas ocultas, melhorar eficiência, aumentar conversão e preparar o sistema para escala previsível.

REGRAS OBRIGATÓRIAS:
- Sempre encontrar o GARGALO PRINCIPAL antes de sugerir qualquer solução
- Sempre pensar em ROI e impacto financeiro
- NUNCA sugerir aumentar tráfego se o problema for conversão
- NUNCA sugerir escalar se o sistema não estiver validado
- Ser direto, estratégico e prático — zero dicas genéricas

ANÁLISE OBRIGATÓRIA — 9 CAMADAS:
1.Estratégia 2.Oferta 3.Posicionamento 4.Público 5.Criativo 6.Funil 7.UX 8.Dados 9.Infraestrutura técnica

SAÍDA OBRIGATÓRIA:
1. GARGALO PRINCIPAL — onde está perdendo dinheiro
2. CLASSIFICAÇÃO: 🟢 Saudável | 🟡 Alerta | 🔴 Crítico
3. TIPO DE PROBLEMA (estratégia fraca / criativo saturado / público mal posicionado / UX fraca / funil ineficiente / tracking inconsistente / escala prematura)
4. FALHAS MAPEADAS: Aquisição / Conversão / Retenção / Criativos / Dados
5. OTIMIZAÇÕES: Quick wins | Melhorias estruturais | Ações de escala
6. TESTES PRÁTICOS: hipótese + o que alterar + métrica de sucesso
7. PLANO 7 DIAS

Responda em português. Seja direto e impiedoso com a análise.`
  },
  {
    id:"linkedin",
    name:"Especialista LinkedIn Ads",
    icon:"💼",
    color:"#d4c06a",
    bg:"#d4c06a18",
    tagline:"B2B · Lead Gen · Sponsored Content · Targeting corporativo",
    quickPrompts:["Como segmentar gestores de marketing no LinkedIn?","Qual objetivo usar para B2B Lead Gen?","CPL alto no LinkedIn — o que fazer?","Diferença entre Lead Gen Forms e conversão no site"],
    system:`Você é o Especialista em LinkedIn Ads do VÓRTEX, focado em campanhas B2B para o mercado brasileiro.

IDENTIDADE: Estratégico, corporativo, orientado a CPL e qualificação. Você sabe que o LinkedIn tem CPM mais alto que Meta, mas com qualidade de lead superior para B2B.

BENCHMARKS LINKEDIN ADS BR:
- CPM médio: R$40-100 (muito mais caro que Meta)
- CTR bom: > 0.5% (expectativa menor que Meta)
- CPL bom: R$80-200 para B2B
- Lead Gen Form CVR: 5-15% (melhor que landing page)

SEGMENTAÇÃO B2B PODEROSA:

COPY B2B:
- Tom consultivo, não vendedor
- Foco em ROI, resultado e eficiência
- Case study ou dado de mercado como prova
- CTA suave: "Saiba mais", "Ver case", "Receber proposta"

Responda em português. Seja técnico e orientado a resultado B2B.`
  },
  {
    id:"relatorio",
    name:"Analista de Relatórios",
    icon:"📋",
    color:"#6a9e8e",
    bg:"#6a9e8e18",
    tagline:"Relatórios para clientes · Storytelling de dados · PDF",
    quickPrompts:["Como apresentar queda de performance para cliente?","Monte relatório mensal para Arena Publicidade","Como justificar aumento de CPL?","Estrutura ideal de relatório semanal"],
    system:`Você é o Analista de Relatórios do VÓRTEX, especialista em comunicar resultados de marketing digital para clientes de forma clara, estratégica e que constrói confiança.

IDENTIDADE: Comunicativo, empático com o cliente, orientado a narrativa. Você transforma dados frios em histórias que justificam decisões e reforçam a autoridade do gestor.

ESTRUTURA DO RELATÓRIO VÓRTEX:
1. SUMÁRIO EXECUTIVO (3 linhas — o essencial)
2. RESULTADOS DO PERÍODO (métricas vs meta vs período anterior)
3. O QUE FUNCIONOU (top 3 ações/criativos)
4. OPORTUNIDADES IDENTIFICADAS (diagnóstico honesto)
5. PRÓXIMOS PASSOS (plano concreto para o próximo período)

COMO APRESENTAR RESULTADOS RUINS:
- Nunca esconder, sempre contextualizar
- "CPL subiu 23% vs mês anterior — identificamos saturação de público e já temos plano de ação para as próximas 2 semanas"
- Mostrar que você detectou antes do cliente
- Apresentar solução junto com o problema

COMO APRESENTAR RESULTADOS BONS:

VOCABULÁRIO PARA NÃO TÉCNICOS:

// ── STATE ────────────────────────────────────────────────────────────────
let currentSquad = null;
let chatHistory = [];
let isLoading = false;

// ── RENDER SIDEBAR ────────────────────────────────────────────────────────
function renderSidebar() {
  document.getElementById("squad-list").innerHTML = SQUADS.map(s => `
    <button class="squad-btn ${currentSquad?.id===s.id?'active':''}" onclick="selectSquad('${s.id}')">
      <div class="squad-icon" style="background:${s.bg}">${s.icon}</div>
      <div class="squad-info">
        <div class="squad-name" style="color:${currentSquad?.id===s.id?s.color:'var(--txt)'}">${s.name}</div>
        <div class="squad-desc">${s.tagline.split('·')[0].trim()}</div>
      </div>
    </button>`).join("");
}

// ── SELECT SQUAD ──────────────────────────────────────────────────────────
function selectSquad(id) {
  currentSquad = SQUADS.find(s=>s.id===id);
  chatHistory = [];
  renderSidebar();

  document.getElementById("agent-icon-big").textContent = currentSquad.icon;
  document.getElementById("agent-icon-big").style.background = currentSquad.bg;
  document.getElementById("agent-name").textContent = currentSquad.name;
  document.getElementById("agent-tagline").textContent = currentSquad.tagline;

  // Quick prompts
  document.getElementById("quick-prompts").innerHTML = currentSquad.quickPrompts.map(p =>
    `<button class="qp" onclick="sendQuick('${p.replace(/'/g,"\\'")}')">${p}</button>`
  ).join("");

  // Welcome message from agent
  document.getElementById("chat-area").innerHTML = `
    <div class="msg msg-agent">
      <span class="agent-tag">${currentSquad.name}</span>
      Olá! Sou o especialista em ${currentSquad.tagline.split('·')[0].trim().toLowerCase()} do VÓRTEX.\n\nPode me trazer qualquer dúvida, campanha para analisar, copy para criar ou estratégia para montar. Estou aqui para ir direto ao ponto.
    </div>`;
}

// ── SEND ──────────────────────────────────────────────────────────────────
async function sendMsg() {
  if (!currentSquad || isLoading) return;
  const input = document.getElementById("user-input");
  const msg = input.value.trim();
  if (!msg) return;

  addMsg("user", msg);
  input.value = ""; input.style.height = "auto";
  chatHistory.push({ role:"user", content:msg });

  isLoading = true;
  document.getElementById("btn-send").disabled = true;

  // Loading dots
  const loadId = "load-" + Date.now();
  document.getElementById("chat-area").insertAdjacentHTML("beforeend",
    `<div class="msg-loading" id="${loadId}"><div class="dot-anim"></div><div class="dot-anim"></div><div class="dot-anim"></div></div>`);
  scrollChat();

  try {
    const r = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:1200,
        system: currentSquad.system,
        messages: chatHistory.slice(-10)
      })
    });
    const d = await r.json();
    const text = d.content?.[0]?.text || "Erro ao processar resposta.";
    chatHistory.push({ role:"assistant", content:text });
    document.getElementById(loadId)?.remove();
    addMsg("agent", text);
  } catch(e) {
    document.getElementById(loadId)?.remove();
    addMsg("agent", `Erro de conexão: ${e.message}`);
  }

  isLoading = false;
  document.getElementById("btn-send").disabled = false;
}

function sendQuick(prompt) {
  document.getElementById("user-input").value = prompt;
  sendMsg();
}

function addMsg(role, text) {
  const el = document.createElement("div");
  el.className = `msg msg-${role}`;
  if (role==="agent") {
    el.innerHTML = `<span class="agent-tag">${currentSquad?.name||"VÓRTEX"}</span>${text}`;
  } else {
    el.textContent = text;
  }
  document.getElementById("chat-area").appendChild(el);
  scrollChat();
}

function scrollChat() {
  const chat = document.getElementById("chat-area");
  chat.scrollTop = chat.scrollHeight;
}

function clearChat() {
  chatHistory = [];
  if (currentSquad) selectSquad(currentSquad.id);
}

// ── INIT ──────────────────────────────────────────────────────────────────
renderSidebar();
</script>
</body>
</html>
